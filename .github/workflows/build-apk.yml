name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Android-

      - name: Build project (Android)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
        with:
          unityVersion:       2022.3.60f1
          targetPlatform:     Android
          projectPath:        .
          buildName:          pita-game
          buildsPath:         builds
          androidExportType:  androidPackage

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pita-game-apk
          path: builds/Android/*.apk
          retention-days: 30

      - name: Job Summary
        run: |
          echo "## ✅ APK Gerado!" >> $GITHUB_STEP_SUMMARY
          echo "Baixe em **Actions → Artifacts → pita-game-apk**" >> $GITHUB_STEP_SUMMARY
